name: First Workflow

on:
  push:
    branches:
      - master

jobs:
  test-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "GitHub Actions is working!"

  second-job:
    runs-on: ubuntu-latest

    steps:
      - name: Say Hello
        run: echo "Hello!"

      - name: Show Date
        run: date

  third-job:
    runs-on: ubuntu-latest

    steps:
      - name: List Files
        run: ls -la